services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: mcphub
      POSTGRES_USER: mcphub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcphub"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcphub
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mcphub
    restart: unless-stopped

  graphiti-mcp:
    image: graphiti-mcp:custom
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: neo4j
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GRAPHITI_GROUP_ID: vex
      SEMAPHORE_LIMIT: "5"
      CONFIG_PATH: /app/mcp/config/config.yaml
      GRAPHITI_TELEMETRY_ENABLED: "false"
      LLM_TEMPERATURE: "0.0"
    volumes:
      - ./graphiti-config.yaml:/app/mcp/config/config.yaml:ro
      - ./patches/schema.py:/app/mcp/src/config/schema.py:ro
      - ./patches/graphiti_mcp_server.py:/app/mcp/src/graphiti_mcp_server.py:ro
      - ./patches/queue_service.py:/app/mcp/src/services/queue_service.py:ro
    networks:
      - mcphub
    restart: unless-stopped

  obsidian-sync:
    build:
      context: .
      dockerfile: Dockerfile.obsidian-sync
    environment:
      OBSIDIAN_AUTH_TOKEN: ${OBSIDIAN_AUTH_TOKEN:-}
    volumes:
      - obsidian_vault:/vault
      - obsidian_config:/root/.config/obsidian-headless
    networks:
      - mcphub
    restart: unless-stopped

  mcphub:
    image: samanhappy/mcphub:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      graphiti-mcp:
        condition: service_started
    volumes:
      - ./mcp_settings.json:/app/mcp_settings.json
      - mcphub-data:/app/data
      - /opt/mcphub/mcp-memory:/data/memory
      - /opt/mcphub/.google_workspace_mcp/credentials:/root/.google_workspace_mcp/credentials
      - obsidian_vault:/data/obsidian-vault
    networks:
      - mcphub
    restart: unless-stopped

volumes:
  pgdata:
  mcphub-data:
  neo4j_data:
  neo4j_logs:
  obsidian_vault:
  obsidian_config:

networks:
  mcphub:
    driver: bridge
