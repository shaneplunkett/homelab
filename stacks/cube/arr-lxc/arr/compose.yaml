services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/radarr:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "7878:7878"

  sonarrtv:
    image: lscr.io/linuxserver/sonarr:develop
    container_name: sonarrtv
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/sonarrtv:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "8989:8989"

  anime-sonarr:
    image: docker.io/binhex/arch-sonarr:latest
    container_name: anime-sonarr
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - UMASK=000
    volumes:
      - /var/lib/containers/anime-sonarr:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "8990:8989"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/prowlarr:/config:Z
    ports:
      - "9696:9696"

  deluge:
    image: lscr.io/linuxserver/deluge:2.2.0-r1-ls364
    container_name: deluge
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/deluge:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8112:8112"

  sabnzbd:
    image: docker.io/binhex/arch-sabnzbd:latest
    container_name: sabnzbd
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - UMASK=000
    volumes:
      - /var/lib/containers/sabnzbd:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "8080:8080"

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: always
    init: true
    environment:
      - LOG_LEVEL=info
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/overseerr:/app/config:Z
    ports:
      - "5055:5055"

  minidlna:
    image: docker.io/binhex/arch-minidlna:latest
    container_name: minidlna
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - SCAN_ON_BOOT=yes
    volumes:
      - /var/lib/containers/minidlna:/config
      - /mnt/programs:/media:ro
    network_mode: host

  shelfarr:
    image: ghcr.io/pedro-revez-silva/shelfarr:latest
    container_name: shelfarr
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/shelfarr:/config:Z
      - /mnt/media:/Media:Z
    ports:
      - "8085:8085"

  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web-automated
    restart: always
    environment:
      - PUID=99
      - PGID=100
      - TZ=Australia/Melbourne
    volumes:
      - /var/lib/containers/calibre-web-automated:/config:Z
      - /mnt/media/library:/calibre-library:Z
      - /mnt/media/downloads/books-ingest:/cwa-book-ingest:Z
    ports:
      - "8083:8083"
